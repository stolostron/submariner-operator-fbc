---
name: Markdown Lint
'on':
  push:
    branches:
      - main
  pull_request:
permissions: {}
jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run markdownlint
        run: make mdlint
