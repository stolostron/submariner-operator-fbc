---
name: Test Image Build
'on':
  push:
    branches:
      - main
  pull_request:
permissions: {}
jobs:
  test-image:
    name: Image Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman git wget jq
          url=https://github.com/mikefarah/yq/releases/latest/download
          sudo wget -qO /usr/bin/yq ${url}/yq_linux_amd64
          sudo chmod +x /usr/bin/yq
      - name: Test image
        run: make test-image
      - name: Stop image
        run: make stop-image
